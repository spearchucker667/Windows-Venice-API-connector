name: macOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  macos-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify generated icon
        run: npm run verify:icon

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Warn if macOS signing credentials are absent
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [[ -z "${{ secrets.CSC_LINK }}" || -z "${{ secrets.CSC_KEY_PASSWORD }}" || -z "${{ secrets.APPLE_ID }}" || -z "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" || -z "${{ secrets.APPLE_TEAM_ID }}" ]]; then
            echo "::warning::macOS signing/notarization credentials not configured — release will be unsigned."
          fi

      - name: Package macOS artifacts (Development)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run dist:mac
        env:
          # Avoid requiring signing secrets by default for testing builds.
          # electron-builder will perform ad-hoc code signing on macOS.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package macOS artifacts (Public Release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run dist:mac
        env:
          # Prevent electron-builder from discovering keychain identities.
          # When CSC_LINK is provided it takes precedence regardless of this flag.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Generate SHA-256 checksums
        run: npm run checksum:release

      - name: Verify release artifacts
        run: npm run verify:dist:mac

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: venice-forge-macos-${{ github.ref_name }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.sha256
          if-no-files-found: error

      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.sha256
          draft: false
          prerelease: false
