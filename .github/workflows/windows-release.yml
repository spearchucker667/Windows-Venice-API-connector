name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  windows-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify generated icon
        run: npm run verify:icon

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Warn if Windows signing credentials are absent
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          if [[ -z "${{ secrets.CSC_LINK }}" || -z "${{ secrets.CSC_KEY_PASSWORD }}" || -z "${{ secrets.WIN_CSC_LINK }}" || -z "${{ secrets.WIN_CSC_KEY_PASSWORD }}" ]]; then
            echo "::warning::Windows signing credentials not configured — release will be unsigned."
          fi

      - name: Package Windows artifacts (Development)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run dist:win

      - name: Package Windows artifacts (Public Release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Generate SHA-256 checksums
        run: npm run checksum:release

      - name: Verify release artifacts
        run: npm run verify:dist:win

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: venice-forge-windows-${{ github.ref_name }}
          path: |
            release/*.exe
            release/*.sha256
          if-no-files-found: error

      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/*.exe
            release/*.sha256
          draft: false
          prerelease: false
