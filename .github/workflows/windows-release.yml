name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify generated icon
        run: npm run verify:icon

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package Windows artifacts
        run: npm run dist:win
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          Get-ChildItem release -Filter *.exe | ForEach-Object {
            $hash = Get-FileHash -Algorithm SHA256 $_.FullName
            "$($hash.Hash)  $($_.Name)" | Set-Content -NoNewline -Encoding ascii "$($_.FullName).sha256"
          }

      - name: Verify release artifacts
        run: npm run verify:dist

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: venice-forge-windows-${{ github.ref_name }}
          path: |
            release/*.exe
            release/*.sha256
          if-no-files-found: error
